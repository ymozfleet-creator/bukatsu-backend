    fbDeleteUser,
    doc, getDoc, setDoc, deleteDoc, collection, getDocs, addDoc,
    onSnapshot, query, where, orderBy, serverTimestamp, Timestamp
  };

  // Auth state listener - restore session on page load
  onAuthStateChanged(auth, async (user) => {
    if (user && typeof window._onFirebaseAuth === 'function') {
      window._onFirebaseAuth(user);
    }
  });

  window._fbReady = true;
  window.dispatchEvent(new Event('firebase-ready'));

  // 既存セッション: Firebase未登録ユーザーを自動登録

  }, 2000);
</script>
